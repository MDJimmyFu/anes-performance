<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻醉績效管理系統</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- PapaParse (CSV) -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- html5-qrcode (barcode scanner) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    table { border-collapse: collapse; }
  </style>
</head>
<body>

  <!-- =====================
       SIDEBAR
       ===================== -->
  <nav id="sidebar">

    <!-- Logo section -->
    <div class="sidebar-logo">
      <div class="sidebar-logo-inner">
        <!-- ECG / Monitor SVG icon -->
        <svg class="sidebar-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="6" fill="rgba(63,185,80,0.1)"/>
          <path d="M3 16 h4 l2 -6 l3 12 l3 -10 l2 6 l2 -3 h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="28" cy="16" r="1.5" fill="currentColor" opacity="0.6"/>
        </svg>
        <span class="sidebar-logo-text">ANESTH</span>
      </div>
      <div class="sidebar-logo-sub">績效管理系統</div>
      <div class="sidebar-rule"></div>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">
      <div class="nav-section-label">主要功能</div>

      <a class="nav-item" data-route="#dashboard">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
          <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
        </svg>
        儀表板
      </a>

      <a class="nav-item" data-route="#cases">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm2 10a1 1 0 10-2 0v3a1 1 0 102 0v-3zm2-3a1 1 0 011 1v5a1 1 0 11-2 0v-5a1 1 0 011-1zm4-1a1 1 0 10-2 0v6a1 1 0 102 0V8z" clip-rule="evenodd"/>
        </svg>
        病例列表
      </a>

      <a class="nav-item" data-route="#add-case">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        新增病例
      </a>

      <div class="nav-section-label">分析</div>

      <a class="nav-item" data-route="#analytics">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
        </svg>
        統計分析
      </a>

      <a class="nav-item" data-route="#export">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        資料匯出
      </a>

      <div class="nav-section-label">設定</div>

      <a class="nav-item" data-route="#settings">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
        點數設定
      </a>

      <a class="nav-item" data-route="#config">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"/>
        </svg>
        系統設定
      </a>
    </div>

    <!-- Sidebar footer: system status -->
    <div class="sidebar-footer">
      <div class="sidebar-status">
        <span class="status-dot" aria-hidden="true"></span>
        連線中
      </div>
    </div>

  </nav>

  <!-- =====================
       MAIN WRAPPER
       ===================== -->
  <div id="main-wrapper">

    <!-- Top Bar -->
    <header id="topbar">
      <button class="hamburger" id="hamburger" aria-label="開啟選單">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
        </svg>
      </button>

      <h2 id="topbar-title">儀表板</h2>

      <div id="month-selector-wrap"></div>

      <!-- Live sync pulse indicator -->
      <span class="topbar-pulse" title="系統運行中" aria-hidden="true"></span>
    </header>

    <!-- Content area -->
    <main id="content">
      <div class="loading-overlay">
        <div class="dot-pulse">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span>載入中...</span>
      </div>
    </main>

  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Scripts (must preserve this exact order) -->
  <script src="js/calculator.js"></script>
  <script src="js/db.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/cases.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/export.js"></script>
  <script src="js/point-settings.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
